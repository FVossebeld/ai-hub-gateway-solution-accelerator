# Deploy Citadel Access Contracts
# 
# This workflow deploys access contracts when changes are merged to citadel-v1.
# PRs and other branches are validated only, not deployed.
# It only deploys contracts that have changed, not all contracts.

name: Deploy Access Contracts

on:
  push:
    branches: [citadel-v1]
    paths:
      - 'bicep/infra/citadel-access-contracts/contracts/**'
  pull_request:
    paths:
      - 'bicep/infra/citadel-access-contracts/contracts/**'
  workflow_dispatch:
    inputs:
      contract_folder:
        description: 'Specific contract folder to deploy (leave empty for all changed)'
        required: false
        type: string

env:
  AZURE_LOCATION: 'swedencentral'
  CONTRACTS_PATH: 'bicep/infra/citadel-access-contracts/contracts'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect Changed Contracts
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Contracts
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.changes.outputs.contracts }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect changed contracts
        id: changes
        run: |
          if [ -n "${{ github.event.inputs.contract_folder }}" ]; then
            # Manual trigger with specific folder
            CONTRACTS='["${{ github.event.inputs.contract_folder }}"]'
          else
            # Detect changes from git diff
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              BASE_SHA=${{ github.event.pull_request.base.sha }}
            else
              BASE_SHA=${{ github.event.before }}
            fi
            
            # Get changed contract folders (excluding _template)
            CHANGED=$(git diff --name-only $BASE_SHA ${{ github.sha }} -- "${{ env.CONTRACTS_PATH }}/" | \
              grep -E "^${{ env.CONTRACTS_PATH }}/[^/]+/" | \
              sed "s|${{ env.CONTRACTS_PATH }}/||" | \
              cut -d'/' -f1 | \
              grep -v "^_template$" | \
              grep -v "^README" | \
              sort -u | \
              jq -R -s -c 'split("\n") | map(select(length > 0))')
            
            CONTRACTS="${CHANGED:-[]}"
          fi
          
          echo "contracts=$CONTRACTS" >> $GITHUB_OUTPUT
          
          if [ "$CONTRACTS" == "[]" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No contract changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed contracts: $CONTRACTS"
          fi

  # ---------------------------------------------------------------------------
  # Validate Contracts (PR only)
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Contracts
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      matrix:
        contract: ${{ fromJson(needs.detect-changes.outputs.contracts) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Pre-flight resource validation for ${{ matrix.contract }}
        run: |
          CONTRACT_PATH="${{ env.CONTRACTS_PATH }}/${{ matrix.contract }}/usecase.bicepparam"
          
          if [ ! -f "$CONTRACT_PATH" ]; then
            echo "❌ Contract file not found: $CONTRACT_PATH"
            exit 1
          fi
          
          echo "🔍 Validating referenced Azure resources exist..."
          
          # Extract APIM configuration from bicepparam file
          APIM_SUB=$(grep -A3 "param apim" "$CONTRACT_PATH" | grep "subscriptionId:" | sed "s/.*'\([^']*\)'.*/\1/")
          APIM_RG=$(grep -A3 "param apim" "$CONTRACT_PATH" | grep "resourceGroupName:" | sed "s/.*'\([^']*\)'.*/\1/")
          APIM_NAME=$(grep -A4 "param apim" "$CONTRACT_PATH" | grep "name:" | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          
          echo "  APIM Subscription: $APIM_SUB"
          echo "  APIM Resource Group: $APIM_RG"
          echo "  APIM Name: $APIM_NAME"
          
          # Validate APIM exists
          if [ -n "$APIM_NAME" ] && [ "$APIM_NAME" != "" ]; then
            echo ""
            echo "🔎 Checking if APIM '$APIM_NAME' exists..."
            if az apim show --name "$APIM_NAME" --resource-group "$APIM_RG" --subscription "$APIM_SUB" --query "name" -o tsv 2>/dev/null; then
              echo "✅ APIM '$APIM_NAME' found"
            else
              echo "❌ ERROR: APIM '$APIM_NAME' not found in resource group '$APIM_RG'"
              echo ""
              echo "Available APIM services in '$APIM_RG':"
              az apim list --resource-group "$APIM_RG" --subscription "$APIM_SUB" --query "[].name" -o tsv 2>/dev/null || echo "  (none found or resource group doesn't exist)"
              echo ""
              echo "Please update the 'apim.name' value in your contract file."
              exit 1
            fi
            
            # Validate API names exist in APIM
            echo ""
            echo "🔎 Validating API names in apiNameMapping exist in APIM..."
            
            # Extract all API names from apiNameMapping
            API_NAMES=$(grep -A 100 "param apiNameMapping" "$CONTRACT_PATH" | \
              sed -n '/param apiNameMapping/,/^}/p' | \
              grep -oE "'[^']+'" | \
              grep -v "param\|apiNameMapping" | \
              tr -d "'" | \
              sort -u)
            
            if [ -z "$API_NAMES" ]; then
              echo "⚠️  Warning: No API names found in apiNameMapping"
            else
              echo "  Checking API names:"
              
              # Get list of all APIs in APIM
              AVAILABLE_APIS=$(az apim api list \
                --resource-group "$APIM_RG" \
                --service-name "$APIM_NAME" \
                --subscription "$APIM_SUB" \
                --query "[].name" -o tsv 2>/dev/null || echo "")
              
              if [ -z "$AVAILABLE_APIS" ]; then
                echo "❌ ERROR: Unable to retrieve API list from APIM '$APIM_NAME'"
                echo ""
                echo "This could be due to permissions or APIM configuration issues."
                exit 1
              fi
              
              # Validate each API name
              MISSING_APIS=""
              for api in $API_NAMES; do
                if echo "$AVAILABLE_APIS" | grep -qx "$api"; then
                  echo "  ✅ $api"
                else
                  echo "  ❌ $api (NOT FOUND)"
                  MISSING_APIS="$MISSING_APIS\n    - $api"
                fi
              done
              
              # Fail if any APIs are missing
              if [ -n "$MISSING_APIS" ]; then
                echo ""
                echo "❌ ERROR: The following API names from your apiNameMapping do not exist in APIM '$APIM_NAME':"
                echo -e "$MISSING_APIS"
                echo ""
                echo "Available APIs in APIM:"
                echo "$AVAILABLE_APIS" | sed 's/^/    - /'
                echo ""
                echo "To fix this issue:"
                echo "  1. Verify the API names in your usecase.bicepparam file match exactly (case-sensitive)"
                echo "  2. Or deploy the missing APIs to APIM first"
                echo "  3. You can list available APIs with:"
                echo "     az apim api list --resource-group $APIM_RG --service-name $APIM_NAME --query \"[].name\" -o tsv"
                echo ""
                exit 1
              fi
              
              echo "✅ All API names validated successfully"
            fi
          fi
          
          # Extract Key Vault configuration
          USE_KV=$(grep "useTargetAzureKeyVault" "$CONTRACT_PATH" | grep -o "true\|false" || echo "false")
          
          if [ "$USE_KV" == "true" ]; then
            KV_SUB=$(grep -A3 "param keyVault" "$CONTRACT_PATH" | grep "subscriptionId:" | sed "s/.*'\([^']*\)'.*/\1/")
            KV_RG=$(grep -A3 "param keyVault" "$CONTRACT_PATH" | grep "resourceGroupName:" | sed "s/.*'\([^']*\)'.*/\1/")
            KV_NAME=$(grep -A4 "param keyVault" "$CONTRACT_PATH" | grep "name:" | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
            
            if [ -n "$KV_NAME" ] && [ "$KV_NAME" != "" ]; then
              echo ""
              echo "🔎 Checking if Key Vault '$KV_NAME' exists..."
              if az keyvault show --name "$KV_NAME" --resource-group "$KV_RG" --subscription "$KV_SUB" --query "name" -o tsv 2>/dev/null; then
                echo "✅ Key Vault '$KV_NAME' found"
              else
                echo "❌ ERROR: Key Vault '$KV_NAME' not found in resource group '$KV_RG'"
                echo ""
                echo "Please verify the Key Vault exists or set 'useTargetAzureKeyVault = false'"
                exit 1
              fi
            fi
          else
            echo ""
            echo "ℹ️  Key Vault storage disabled (useTargetAzureKeyVault = false)"
          fi
          
          echo ""
          echo "✅ Pre-flight resource validation passed"
      
      - name: Validate Bicep template for ${{ matrix.contract }}
        run: |
          CONTRACT_PATH="${{ env.CONTRACTS_PATH }}/${{ matrix.contract }}/usecase.bicepparam"
          
          echo "📋 Validating Bicep template..."
          az deployment sub validate \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file bicep/infra/citadel-access-contracts/main.bicep \
            --parameters "$CONTRACT_PATH" \
            --output table
          
          echo "✅ ${{ matrix.contract }} Bicep validation passed"
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Contract `${{ matrix.contract }}` validated successfully!\n\n- Pre-flight resource check: ✅\n- Bicep validation: ✅'
            })

  # ---------------------------------------------------------------------------
  # Deploy Contracts (main only)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Contracts
    runs-on: ubuntu-latest
    needs: [detect-changes, validate]
    if: |
      github.event_name != 'pull_request' && 
      needs.detect-changes.outputs.has_changes == 'true'
    environment: production
    strategy:
      matrix:
        contract: ${{ fromJson(needs.detect-changes.outputs.contracts) }}
      max-parallel: 1  # Deploy one at a time to avoid conflicts
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Deploy ${{ matrix.contract }}
        run: |
          CONTRACT_PATH="${{ env.CONTRACTS_PATH }}/${{ matrix.contract }}/usecase.bicepparam"
          DEPLOYMENT_NAME="contract-${{ matrix.contract }}-$(date +%Y%m%d-%H%M%S)"
          
          echo "🚀 Deploying ${{ matrix.contract }}..."
          
          az deployment sub create \
            --name "$DEPLOYMENT_NAME" \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file bicep/infra/citadel-access-contracts/main.bicep \
            --parameters "$CONTRACT_PATH" \
            --output table
          
          echo "✅ ${{ matrix.contract }} deployed successfully"
      
      - name: Summary
        run: |
          echo "### Contract Deployed: ${{ matrix.contract }} :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following was created/updated:" >> $GITHUB_STEP_SUMMARY
          echo "- APIM Product" >> $GITHUB_STEP_SUMMARY
          echo "- APIM Subscription" >> $GITHUB_STEP_SUMMARY
          echo "- Key Vault Secrets (if configured)" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy]
    if: always() && github.event_name != 'pull_request'
    
    steps:
      - name: Summary
        run: |
          echo "### Access Contract Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Contract | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          CONTRACTS='${{ needs.detect-changes.outputs.contracts }}'
          for contract in $(echo $CONTRACTS | jq -r '.[]'); do
            echo "| $contract | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          done
